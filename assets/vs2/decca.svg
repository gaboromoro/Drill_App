<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="400" height="300" fill="#f4f3ee"/>
  <text x="200" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">Decca tree</text>
  <text x="200" y="50" text-anchor="middle" font-size="13" fill="#555">3 gulove (omni) do tvaru T: L, stred (vpredu), R</text>
  <!-- T frame -->
  <line x1="120" y1="170" x2="280" y2="170" stroke="#999" stroke-width="2"/>
  <line x1="200" y1="170" x2="200" y2="110" stroke="#999" stroke-width="2"/>
  <!-- center front mic -->
  <circle cx="200" cy="110" r="22" fill="#cfe3f5" fill-opacity="0.45" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="200" cy="110" r="9" fill="#333"/>
  <text x="200" y="92" text-anchor="middle" font-size="12" fill="#2c6fb3">stred (vpredu)</text>
  <!-- left/right mics -->
  <circle cx="120" cy="170" r="22" fill="#cfe3f5" fill-opacity="0.45" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="120" cy="170" r="9" fill="#333"/>
  <text x="120" y="210" text-anchor="middle" font-size="12" fill="#2c6fb3">L</text>
  <circle cx="280" cy="170" r="22" fill="#cfe3f5" fill-opacity="0.45" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="280" cy="170" r="9" fill="#333"/>
  <text x="280" y="210" text-anchor="middle" font-size="12" fill="#2c6fb3">R</text>
  <text x="200" y="262" text-anchor="middle" font-size="12" fill="#555">klasika pre velky symfonicky orchester</text>
</svg>
