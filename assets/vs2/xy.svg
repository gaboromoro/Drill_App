<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="400" height="300" fill="#f4f3ee"/>
  <text x="200" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">XY — koincidencny par</text>
  <text x="200" y="50" text-anchor="middle" font-size="13" fill="#555">2 kardioidy v jednom bode, uhol 90 st.</text>
  <text x="200" y="78" text-anchor="middle" font-size="12" fill="#888">zdroj zvuku</text>
  <polygon points="200,86 191,102 209,102" fill="#bbb"/>
  <!-- cardioid lobes -->
  <g transform="translate(200,205) rotate(-45)"><path d="M0 0 L-24 -38 A45 45 0 0 1 24 -38 Z" fill="#cfe3f5" fill-opacity="0.7" stroke="#4a90d9" stroke-width="1.5"/></g>
  <g transform="translate(200,205) rotate(45)"><path d="M0 0 L-24 -38 A45 45 0 0 1 24 -38 Z" fill="#cfe3f5" fill-opacity="0.7" stroke="#4a90d9" stroke-width="1.5"/></g>
  <!-- axes -->
  <line x1="200" y1="205" x2="158" y2="163" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="200" y1="205" x2="242" y2="163" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="5 3"/>
  <path d="M175 180 A35 35 0 0 1 225 180" fill="none" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="200" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#1a7f37">90 st.</text>
  <circle cx="200" cy="205" r="10" fill="#333"/>
  <text x="200" y="240" text-anchor="middle" font-size="12" fill="#555">stereo iba rozdielom intenzity</text>
  <text x="200" y="258" text-anchor="middle" font-size="12" fill="#555">dobra monokompatibilita</text>
</svg>
