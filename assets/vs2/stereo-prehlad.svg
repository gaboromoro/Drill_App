<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="300" fill="#f4f3ee"/>
  <text x="220" y="26" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Stereo: koincidencne vs rozlozene</text>

  <!-- left: coincident (intensity) -->
  <text x="115" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#1a7f37">Koincidencne</text>
  <text x="115" y="74" text-anchor="middle" font-size="12" fill="#555">rozdiel INTENZITY</text>
  <line x1="40" y1="120" x2="190" y2="120" stroke="#ccc" stroke-width="1"/>
  <circle cx="115" cy="160" r="11" fill="#333"/>
  <path d="M115 160 L92 124 A42 42 0 0 1 138 124 Z" fill="#cfe3f5" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="115" y1="160" x2="92" y2="118" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="115" y1="160" x2="138" y2="118" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="115" y="112" text-anchor="middle" font-size="12" fill="#1a7f37">uhol</text>
  <text x="115" y="200" text-anchor="middle" font-size="11" fill="#555">oba v jednom bode</text>
  <text x="115" y="216" text-anchor="middle" font-size="11" fill="#555">mono OK</text>

  <!-- divider -->
  <line x1="220" y1="50" x2="220" y2="250" stroke="#ddd" stroke-width="1.5"/>

  <!-- right: spaced (time) -->
  <text x="325" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">Rozlozene (AB)</text>
  <text x="325" y="74" text-anchor="middle" font-size="12" fill="#555">rozdiel CASU/fazy</text>
  <circle cx="285" cy="150" r="22" fill="none" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="285" cy="150" r="9" fill="#333"/>
  <circle cx="365" cy="150" r="22" fill="none" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="365" cy="150" r="9" fill="#333"/>
  <line x1="285" y1="186" x2="365" y2="186" stroke="#c0392b" stroke-width="1.5"/>
  <text x="325" y="204" text-anchor="middle" font-size="12" fill="#c0392b">40-60 cm</text>
  <text x="325" y="232" text-anchor="middle" font-size="11" fill="#555">mono: riziko hrebenoveho filtra</text>

  <text x="220" y="278" text-anchor="middle" font-size="11" fill="#888">near-koincidencne (ORTF/DIN/NOS) = kombinacia oboch</text>
</svg>
