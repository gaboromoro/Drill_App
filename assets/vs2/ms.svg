<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="400" height="300" fill="#f4f3ee"/>
  <text x="200" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">MS — Middle / Side</text>
  <text x="200" y="50" text-anchor="middle" font-size="13" fill="#555">stred = kardioida, boky = osmicka</text>
  <text x="200" y="76" text-anchor="middle" font-size="12" fill="#888">zdroj zvuku</text>
  <polygon points="200,84 191,100 209,100" fill="#bbb"/>
  <!-- M cardioid forward -->
  <path d="M200 205 L176 165 A45 45 0 0 1 224 165 Z" fill="#cfe3f5" fill-opacity="0.75" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="200" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#2c6fb3">M (kardioida)</text>
  <!-- S figure-8 sideways -->
  <ellipse cx="138" cy="205" rx="40" ry="17" fill="#f3d6d6" fill-opacity="0.6" stroke="#c0392b" stroke-width="1.5"/>
  <ellipse cx="262" cy="205" rx="40" ry="17" fill="#f3d6d6" fill-opacity="0.6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="92" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">S (osmicka)</text>
  <circle cx="200" cy="205" r="10" fill="#333"/>
  <text x="200" y="252" text-anchor="middle" font-size="12" fill="#555">L/R = matica M+S / M-S</text>
  <text x="200" y="270" text-anchor="middle" font-size="12" fill="#555">sirku stereobazy menis aj po nahrati</text>
</svg>
