<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="400" height="300" fill="#f4f3ee"/>
  <text x="200" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">Jecklin Disk (OSS)</text>
  <text x="200" y="50" text-anchor="middle" font-size="13" fill="#555">2 gulove po stranach tlmeneho disku (~30 cm)</text>
  <!-- damped disk -->
  <ellipse cx="200" cy="160" rx="16" ry="70" fill="#d8cfae" stroke="#9a8c5a" stroke-width="2"/>
  <text x="200" y="250" text-anchor="middle" font-size="11" fill="#9a7a2a">tlmeny disk (tieni ako hlava)</text>
  <!-- omni mics either side -->
  <circle cx="168" cy="160" r="20" fill="#cfe3f5" fill-opacity="0.45" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="168" cy="160" r="8" fill="#333"/>
  <circle cx="232" cy="160" r="20" fill="#cfe3f5" fill-opacity="0.45" stroke="#4a90d9" stroke-width="1.5"/>
  <circle cx="232" cy="160" r="8" fill="#333"/>
  <line x1="168" y1="92" x2="232" y2="92" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="168" y1="86" x2="168" y2="98" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="232" y1="86" x2="232" y2="98" stroke="#c0392b" stroke-width="1.5"/>
  <text x="200" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">~16-36 cm</text>
  <text x="200" y="278" text-anchor="middle" font-size="12" fill="#555">disk simuluje akusticky tien hlavy</text>
</svg>
